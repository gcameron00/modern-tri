<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="Inter, 'Helvetica Neue', Helvetica, Arial, sans-serif">
  <!-- Open Graph / social-share card for Modern Triathlon (1200×630) -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1020"/>
      <stop offset="1" stop-color="#070b16"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff5a5f"/>
      <stop offset="0.5" stop-color="#28d0c8"/>
      <stop offset="1" stop-color="#f5b942"/>
    </linearGradient>
    <radialGradient id="glowR" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ff5a5f" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#ff5a5f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowT" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#28d0c8" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#28d0c8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowG" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f5b942" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#f5b942" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="240" cy="120" r="360" fill="url(#glowR)"/>
  <circle cx="600" cy="640" r="380" fill="url(#glowT)"/>
  <circle cx="980" cy="140" r="360" fill="url(#glowG)"/>
  <rect x="20" y="20" width="1160" height="590" rx="28" fill="none" stroke="#1d2740" stroke-width="2"/>

  <!-- Brand lockup (top-left) -->
  <g transform="translate(72,70)">
    <circle cx="20" cy="20" r="18" fill="none" stroke="#f5b942" stroke-width="2.6"/>
    <path d="M11 26 L17 14 L22 22 L29 12" fill="none" stroke="#f5b942" stroke-width="3"
          stroke-linecap="round" stroke-linejoin="round"/>
    <text x="52" y="28" font-size="26" font-weight="800" fill="#f4f6fb">Modern<tspan fill="#f5b942">Tri</tspan></text>
  </g>

  <!-- Eyebrow badge -->
  <g transform="translate(600,180)" text-anchor="middle">
    <rect x="-220" y="-26" width="440" height="44" rx="22" fill="#0f1830" stroke="#2a3656" stroke-width="1.5"/>
    <text x="0" y="4" font-size="19" font-weight="700" letter-spacing="3" fill="#9fb0d0">A SPOOF ENDURANCE BRAND</text>
  </g>

  <!-- Title -->
  <text x="600" y="300" text-anchor="middle" font-size="86" font-weight="900" fill="url(#title)">Run · Bike · Cocktails</text>
  <text x="600" y="352" text-anchor="middle" font-size="30" font-weight="600" fill="#c4cee2">The modern triathlon, reimagined — forget the swim.</text>

  <!-- Discipline icons: run → bike → cocktail -->
  <!-- Leg 1 — RUN (coral) -->
  <g transform="translate(296,406) scale(2)" fill="none" stroke="#ff5a5f" stroke-width="3.4"
     stroke-linecap="round" stroke-linejoin="round">
    <circle cx="40" cy="12" r="5" fill="#ff5a5f" stroke="none"/>
    <path d="M41 20 L30 30 L37 36 L34 50"/>
    <path d="M30 30 L18 34"/>
    <path d="M37 36 L48 40"/>
    <path d="M34 50 L24 56"/>
    <path d="M41 20 L52 26"/>
  </g>

  <!-- Arrow -->
  <g transform="translate(454,444) scale(1.3)" fill="none" stroke="#5d6b8c" stroke-width="3"
     stroke-linecap="round" stroke-linejoin="round">
    <path d="M5 20 H30"/>
    <path d="M24 13 L33 20 L24 27"/>
  </g>

  <!-- Leg 2 — BIKE (teal) -->
  <g transform="translate(536,406) scale(2)" fill="none" stroke="#28d0c8" stroke-width="3.2"
     stroke-linecap="round" stroke-linejoin="round">
    <circle cx="16" cy="44" r="11"/>
    <circle cx="48" cy="44" r="11"/>
    <path d="M16 44 L28 24 L42 24"/>
    <path d="M28 24 L36 44 L48 44"/>
    <path d="M22 24 L32 24"/>
    <circle cx="38" cy="18" r="3" fill="#28d0c8" stroke="none"/>
  </g>

  <!-- Arrow -->
  <g transform="translate(694,444) scale(1.3)" fill="none" stroke="#5d6b8c" stroke-width="3"
     stroke-linecap="round" stroke-linejoin="round">
    <path d="M5 20 H30"/>
    <path d="M24 13 L33 20 L24 27"/>
  </g>

  <!-- Leg 3 — COCKTAIL (gold) -->
  <g transform="translate(776,406) scale(2)" fill="none" stroke="#f5b942" stroke-width="3.2"
     stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 16 L52 16 L32 38 Z"/>
    <path d="M32 38 L32 54"/>
    <path d="M22 54 L42 54"/>
    <path d="M20 16 L44 16"/>
    <circle cx="40" cy="22" r="3.4" fill="#f5b942" stroke="none"/>
  </g>

  <!-- Footer tagline -->
  <text x="600" y="592" text-anchor="middle" font-size="22" font-weight="600" letter-spacing="1" fill="#7f8db0">Three disciplines. One glorious finish line.</text>
</svg>
